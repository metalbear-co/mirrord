name: Build Agent Image
description: Build the mirrord agent Docker image and upload as artifact

runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
    - name: build and export
      shell: bash
      env:
        PLATFORMS: "linux/amd64"
        AGENT_TAGS: "test"
      run: docker buildx bake -f ci/docker-bake.hcl agent --set "agent.output=type=docker,dest=${{ github.workspace }}/test.tar"
    - name: upload image
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
      with:
        name: test
        path: ${{ github.workspace }}/test.tar
