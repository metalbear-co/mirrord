# The test apps, and every toolchain needed to build them, live in the E2E runner image. This only
# brings up the cluster the suites run against, which is the one thing that cannot live in there.
name: "Setup mirrord e2e environment"
description: "Start the Kubernetes cluster the mirrord e2e tests run against"
inputs:
  container-runtime:
    description: "Container runtime to setup when using minikube"
    default: "containerd"
  cluster-runtime:
    description: "Kubernetes cluster runtime to setup (minikube or kind)"
    default: "minikube"
  kind-cluster-name:
    description: "Name of the kind cluster to setup"
    default: "mirrord-e2e"
runs:
  using: "composite"
  steps:
    - name: Validate cluster runtime
      if: ${{ inputs.cluster-runtime != 'minikube' && inputs.cluster-runtime != 'kind' }}
      run: exit 1
      shell: bash
    - name: start minikube
      if: ${{ inputs.cluster-runtime == 'minikube' }}
      uses: metalbear-co/setup-minikube@5e53a22fad27011bc52d2caf69b8e383a53ef889
      with:
        container-runtime: ${{ inputs.container-runtime }}
        cpus: "max"
        memory: "12gb"
        start-args: "--disk-size=40g"
    - name: start kind
      if: ${{ inputs.cluster-runtime == 'kind' }}
      uses: metalbear-co/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc
      with:
        cluster_name: ${{ inputs.kind-cluster-name }}
        wait: "120s"
