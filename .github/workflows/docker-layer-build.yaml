name: Release layer builder image
on:
  workflow_call:
    outputs:
      layer_tag:
        description: "The Docker tag for the layer x64 image"
        value: ${{ jobs.image.outputs.tag }}
      layer_aarch64_tag:
        description: "The Docker tag for the layer aarch64 image"
        value: ${{ jobs.image.outputs.tag_aarch64 }}
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set-tags.outputs.tag }}
      tag_aarch64: ${{ steps.set-tags-aarch64.outputs.tag }}
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine test image version
        uses: ./ci/get-image-tag
        id: set-tags
        with:
          ci_changed: "true"
          target_dir: ci/layer-build
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./ci
          file: ci/layer-build/x86_64.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/metalbear-co/ci-layer-build:latest
            ghcr.io/metalbear-co/ci-layer-build:${{ steps.set-tags.outputs.tag }}

      - name: Determine aarch test image version
        uses: ./ci/get-image-tag
        id: set-tags-aarch64
        with:
          ci_changed: "true"
          target_dir: ci/layer-build
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./ci
          file: ci/layer-build/aarch64.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/metalbear-co/ci-layer-build-aarch64:latest
            ghcr.io/metalbear-co/ci-layer-build-aarch64:${{ steps.set-tags-aarch64.outputs.tag }}
