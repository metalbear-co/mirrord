name: Test Windows

on:
  workflow_call:
    inputs:
      rust_toolchain:
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  CARGO_TERM_COLOR: never
  MIRRORD_TELEMETRY: false
  RUST_BACKTRACE: full

jobs:
  windows-tests:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    env:
      MIRRORD_TESTS_USE_BINARY: ${{ github.workspace }}/target/debug/mirrord.exe
      MIRRORD_LAYER_FILE: ${{ github.workspace }}/target/debug/mirrord_layer_win.dll
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: Remove-Item rust-toolchain.toml
      - uses: metalbear-co/setup-rust-toolchain@a8d42d5aa259519dac1faeee20e37c1fb43453a3
        with:
          cache-shared-key: mirrord-${{ runner.os }}-${{ runner.arch }}
          target: x86_64-pc-windows-msvc
          toolchain: ${{ inputs.rust_toolchain }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.14"
      - name: Build Windows layer
        run: cargo build --package mirrord-layer-win
      - name: Build debug mirrord
        run: cargo build --package mirrord
      - name: Build release mirrord with 32 MiB stack
        run: |
          $env:CARGO_ENCODED_RUSTFLAGS = "-C$([char]0x1f)link-args=/STACK:33554432"
          cargo build --package mirrord --release
      - name: Run focused Windows layer integration tests
        id: windows-layer-integration
        continue-on-error: true
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $false
          $logRoot = Join-Path $env:GITHUB_WORKSPACE "windows-layer-integration-logs"
          New-Item -ItemType Directory -Force -Path $logRoot | Out-Null

          function Invoke-WindowsLayerTest {
            param(
              [string]$Name,
              [string]$Target,
              [string]$Filter,
              [string]$IntproxyLog,
              [string]$MirrordBinary,
              [bool]$RunNodeControl
            )

            $testLogRoot = Join-Path $logRoot $Name
            $logPath = Join-Path $testLogRoot "diagnostic.log"
            $layerLogPath = Join-Path $testLogRoot "layer"
            $intproxyLogRoot = Join-Path $testLogRoot "intproxy"
            New-Item -ItemType Directory -Force -Path $testLogRoot | Out-Null
            New-Item -ItemType Directory -Force -Path $layerLogPath | Out-Null
            New-Item -ItemType Directory -Force -Path $intproxyLogRoot | Out-Null
            Set-Content -Path $logPath -Value "Windows layer integration diagnostic: $Name"

            Add-Content -Path $logPath -Value "`n=== mirrord executable ==="
            Add-Content -Path $logPath -Value $MirrordBinary
            $dumpbinPath = (Get-Command dumpbin.exe -CommandType Application -ErrorAction SilentlyContinue).Path
            if ([string]::IsNullOrEmpty($dumpbinPath)) {
              $vswherePath = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio\Installer\vswhere.exe"
              if (Test-Path $vswherePath) {
                $installationPath = & $vswherePath -latest -products * `
                  -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
                  -property installationPath
                if ($installationPath) {
                  $dumpbinPath = Get-ChildItem `
                    -Path (Join-Path $installationPath "VC\Tools\MSVC") `
                    -Filter dumpbin.exe `
                    -Recurse `
                    -ErrorAction SilentlyContinue |
                    Select-Object -First 1 -ExpandProperty FullName
                }
              }
            }
            if ([string]::IsNullOrEmpty($dumpbinPath)) {
              Add-Content -Path $logPath -Value "dumpbin.exe was not available on PATH"
            } else {
              $stackReserve = & $dumpbinPath /headers $MirrordBinary 2>&1 |
                Select-String -Pattern "size of stack reserve"
              if ($null -eq $stackReserve) {
                Add-Content -Path $logPath -Value "dumpbin did not report a stack reserve"
              } else {
                $stackReserve | ForEach-Object {
                  Add-Content -Path $logPath -Value $_.ToString()
                }
              }
            }

            $controlExitCode = 0
            if ($RunNodeControl) {
              Add-Content -Path $logPath -Value "`n=== Direct Node control ==="
              & node "mirrord/layer-tests/tests/apps/empty_node.mjs" 2>&1 |
                Tee-Object -FilePath $logPath -Append |
                ForEach-Object { Write-Host $_ }
              $controlExitCode = $LASTEXITCODE
              Add-Content -Path $logPath -Value "Direct Node exit code: $controlExitCode"
            }

            $env:MIRRORD_TESTS_USE_BINARY = $MirrordBinary
            $env:MIRRORD_LAYER_LOG_PATH = $layerLogPath
            $env:MIRRORD_TEST_INTPROXY_LOG_DIR = $intproxyLogRoot
            $cargoArgs = @(
              "test",
              "--package", "mirrord-layer-tests",
              "--no-default-features",
              "--test", $Target,
              $Filter,
              "--",
              "--nocapture",
              "--test-threads=1"
            )

            Add-Content -Path $logPath -Value "`n=== mirrord integration test ==="
            & cargo @cargoArgs 2>&1 |
              Tee-Object -FilePath $logPath -Append |
              ForEach-Object { Write-Host $_ }
            $testExitCode = $LASTEXITCODE
            Add-Content -Path $logPath -Value "Integration test exit code: $testExitCode"

            Add-Content -Path $logPath -Value "`n=== Layer file logs ==="
            Get-ChildItem -Path $layerLogPath -File -ErrorAction SilentlyContinue |
              Sort-Object LastWriteTime |
              ForEach-Object {
                Add-Content -Path $logPath -Value "`n--- $($_.FullName) ---"
                Get-Content -Path $_.FullName -Raw | Add-Content -Path $logPath
              }

            $intproxyPath = Join-Path $intproxyLogRoot "windows/$IntproxyLog"
            Add-Content -Path $logPath -Value "`n=== TestIntProxy log ==="
            if (Test-Path $intproxyPath) {
              Get-Content -Path $intproxyPath -Raw | Add-Content -Path $logPath
            } else {
              Add-Content -Path $logPath -Value "No TestIntProxy log found at $intproxyPath"
            }

            return ($controlExitCode -eq 0 -and $testExitCode -eq 0)
          }

          $allPassed = $true
          if (-not (Invoke-WindowsLayerTest `
            -Name "empty_node_app_windows" `
            -Target "windows_startup" `
            -Filter "empty_node_app_windows" `
            -IntproxyLog "empty_node_app_windows" `
            -MirrordBinary (Join-Path $env:GITHUB_WORKSPACE "target/debug/mirrord.exe") `
            -RunNodeControl $true)) {
            $allPassed = $false
          }
          if (-not (Invoke-WindowsLayerTest `
            -Name "python_socketpair_windows" `
            -Target "socketpair" `
            -Filter "python_socketpair_windows" `
            -IntproxyLog "python_socketpair_windows" `
            -MirrordBinary (Join-Path $env:GITHUB_WORKSPACE "target/debug/mirrord.exe") `
            -RunNodeControl $false)) {
            $allPassed = $false
          }
          if (-not (Invoke-WindowsLayerTest `
            -Name "empty_node_app_windows_release_32mb" `
            -Target "windows_startup" `
            -Filter "empty_node_app_windows" `
            -IntproxyLog "empty_node_app_windows_release_32mb" `
            -MirrordBinary (Join-Path $env:GITHUB_WORKSPACE "target/release/mirrord.exe") `
            -RunNodeControl $false)) {
            $allPassed = $false
          }
          if (-not (Invoke-WindowsLayerTest `
            -Name "python_socketpair_windows_release_32mb" `
            -Target "socketpair" `
            -Filter "python_socketpair_windows" `
            -IntproxyLog "python_socketpair_windows_release_32mb" `
            -MirrordBinary (Join-Path $env:GITHUB_WORKSPACE "target/release/mirrord.exe") `
            -RunNodeControl $false)) {
            $allPassed = $false
          }

          if (-not $allPassed) {
            exit 1
          }
      - name: Upload empty Node diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: windows-layer-integration-empty_node_app_windows.log
          path: windows-layer-integration-logs/empty_node_app_windows
          if-no-files-found: warn
      - name: Upload socketpair diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: windows-layer-integration-python_socketpair_windows.log
          path: windows-layer-integration-logs/python_socketpair_windows
          if-no-files-found: warn
      - name: Upload release 32 MiB empty Node diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: windows-layer-integration-empty_node_app_windows_release_32mb.log
          path: windows-layer-integration-logs/empty_node_app_windows_release_32mb
          if-no-files-found: warn
      - name: Upload release 32 MiB socketpair diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: windows-layer-integration-python_socketpair_windows_release_32mb.log
          path: windows-layer-integration-logs/python_socketpair_windows_release_32mb
          if-no-files-found: warn
      - name: Report focused integration-test failures
        if: ${{ always() && steps.windows-layer-integration.outcome == 'failure' }}
        run: exit 1
