name: Test Windows

on:
  workflow_call:
    inputs:
      rust_toolchain:
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  MIRRORD_TELEMETRY: false

jobs:
  windows-tests:
    runs-on: windows-latest
    env:
      MIRRORD_TESTS_USE_BINARY: ${{ github.workspace }}/target/debug/mirrord.exe
      MIRRORD_LAYER_FILE: ${{ github.workspace }}/target/debug/mirrord_layer_win.dll
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # Checkout the mirrord repo.
      # the setup rust toolchain action ignores the input if file exists.. so remove it
      - run: Remove-Item rust-toolchain.toml
      - uses: metalbear-co/setup-rust-toolchain@d197c158264056996cfba74a9c2d93886346edc3
        with:
          cache-shared-key: mirrord-${{ runner.os }}-${{ runner.arch }}
          components: rustfmt, clippy
          toolchain: ${{ inputs.rust_toolchain }}

      - run: |
          cd mirrord/layer-tests/tests/apps/outgoing
          cargo build
      - name: build layer
        run: cargo build -p mirrord-layer-win
      - name: build mirrord
        run: cargo build -p mirrord
      - uses: metalbear-co/install-action@98dac1828614f016bb6346e86fa46318e9328a07
        with:
          tool: cargo-nextest
      - name: mirrord layer integration tests
        run: |
          $ErrorActionPreference = "Stop"
          cargo nextest run -p mirrord-layer-tests --no-default-features
      - name: run UT
        run: |
          $ErrorActionPreference = "Stop"
          cargo nextest run -p mirrord -p mirrord-layer-win
