name: Test Windows

on:
  workflow_call:
    inputs:
      rust_toolchain:
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  MIRRORD_TELEMETRY: false

jobs:
  windows-tests:
    runs-on: windows-latest
    env:
      MIRRORD_TESTS_USE_BINARY: ${{ github.workspace }}/target/debug/mirrord.exe
      MIRRORD_LAYER_FILE: ${{ github.workspace }}/target/debug/mirrord_layer_win.dll
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: Remove-Item rust-toolchain.toml
      - uses: metalbear-co/setup-rust-toolchain@a8d42d5aa259519dac1faeee20e37c1fb43453a3
        with:
          cache-shared-key: mirrord-${{ runner.os }}-${{ runner.arch }}
          components: rustfmt, clippy
          target: x86_64-pc-windows-msvc
          toolchain: ${{ inputs.rust_toolchain }}
      - run: |
          cd mirrord/layer-tests/tests/apps/issue1123
          rustc issue1123.rs --out-dir target
      - run: |
          cd mirrord/layer-tests/tests/apps/outgoing
          cargo build
      - run: |
          cd mirrord/layer-tests/tests/apps/dns_resolve
          cargo build
      - run: |
          cd mirrord/layer-tests/tests/apps/rebind0
          cargo build
      - run: |
          cd mirrord/layer-tests/tests/apps/issue2058
          rustc issue2058.rs --out-dir target
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
      - run: npm install express
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      - run: pip3 install --break-system-packages flask fastapi uvicorn[standard]
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.24"
          cache-dependency-path: tests/go-e2e/go.sum
      - run: |
          go version
      - run: |
          . ./scripts/win_build_test_apps_utils.ps1
          Build-RepoGoApps -RepoRoot (Join-Path $pwd "mirrord/layer-tests/tests") -OutputPrefix "24"
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.25"
          cache: false
      - run: |
          go version
      - run: |
          . ./scripts/win_build_test_apps_utils.ps1
          Build-RepoGoApps -RepoRoot (Join-Path $pwd "mirrord/layer-tests/tests") -OutputPrefix "25"
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.26"
          cache: false
      - run: |
          go version
      - run: |
          . ./scripts/win_build_test_apps_utils.ps1
          Build-RepoGoApps -RepoRoot (Join-Path $pwd "mirrord/layer-tests/tests") -OutputPrefix "26"
      - name: build layer
        run: cargo build -p mirrord-layer-win
      - name: build mirrord
        run: cargo build -p mirrord
      - name: Download procdump
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri https://live.sysinternals.com/procdump.exe -OutFile procdump.exe
      # The overflow is deterministic with libtest output capture ON (i.e. NO --nocapture). Rust
      # turns it into a fast-fail abort, which postmortem debuggers (procdump -i / WER) miss, so
      # attach procdump LIVE (-e -w) to dump the faulting process when the exception is raised.
      # Watch both the target and the CLI; whichever overflows gets dumped.
      - name: mirrord layer integration tests
        run: |
          $dumpDir = Join-Path $env:GITHUB_WORKSPACE "crashdumps"
          New-Item -ItemType Directory -Force -Path $dumpDir | Out-Null
          $watch = @('dns_resolve.exe','mirrord.exe') | ForEach-Object {
            Start-Process .\procdump.exe -ArgumentList '-accepteula','-ma','-e','-w',$_,$dumpDir -PassThru -NoNewWindow
          }
          cargo test -p mirrord-layer-tests --no-default-features
          $code = $LASTEXITCODE
          Start-Sleep -Seconds 5
          foreach ($p in $watch) { if (-not $p.HasExited) { Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue } }
          Write-Host "=== captured dumps ==="
          Get-ChildItem -Force $dumpDir | Format-Table Name,Length,LastWriteTime
          exit $code
      - name: Upload crash dumps
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: windows-crash-dumps
          path: |
            crashdumps/
            target/debug/*.pdb
          if-no-files-found: ignore
      - name: run UT
        run: |
          $ErrorActionPreference = "Stop"
          cargo test -p mirrord -p mirrord-layer-win
      - name: mirrord intproxy UT
        run: |
          $ErrorActionPreference = "Stop"
          cargo test -p mirrord-intproxy
