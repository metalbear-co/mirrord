      #   with:
      #     go-version: "1.26"
      #     cache: false
      # - run: go version
      # - run: |
      #     . ./scripts/win_build_test_apps_utils.ps1
      #     Build-RepoGoApps -RepoRoot (Join-Path $pwd "mirrord/layer-tests/tests") -OutputPrefix "26"
      - name: build layer
        run: cargo build -p mirrord-layer-win
      - name: build mirrord
        run: cargo build -p mirrord
      - name: Download procdump
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri https://live.sysinternals.com/procdump.exe -OutFile procdump.exe
      # Loop the (intermittent) crash; procdump postmortem dumps any crashing process.
      - name: Reproduce dns_resolve crash under procdump
        run: |
          $dumpDir = Join-Path $env:GITHUB_WORKSPACE "crashdumps"
          New-Item -ItemType Directory -Force -Path $dumpDir | Out-Null
          .\procdump.exe -accepteula -ma -i $dumpDir
          $repro = $false
          for ($i = 1; $i -le 30; $i++) {
            Write-Host "=== dns_resolve attempt $i ==="
            cargo test -p mirrord-layer-tests --no-default-features test_dns_resolve -- --nocapture --test-threads=1
            if ($LASTEXITCODE -ne 0) { Write-Host "FAILED on attempt $i"; $repro = $true; break }
          }
          .\procdump.exe -u
          Write-Host "=== captured dumps in $dumpDir ==="
          Get-ChildItem -Force $dumpDir | Format-Table Name,Length,LastWriteTime
          if (-not $repro) { Write-Host "no repro in 30 attempts -- crash may be full-suite/ordering dependent" }
      - name: Upload crash dumps
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: windows-crash-dumps
          # mirrord_layer_win.pdb symbolicates the layer frames (the interesting ones).
          path: |
            crashdumps/
            target/debug/*.pdb
          if-no-files-found: ignore
