name: Test Windows

on:
  workflow_call:
    inputs:
      rust_toolchain:
        required: true
        type: string

permissions:
  contents: read

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  MIRRORD_TELEMETRY: false

jobs:
  windows-tests:
    runs-on: windows-latest
    env:
      MIRRORD_TESTS_USE_BINARY: ${{ github.workspace }}/target/debug/mirrord.exe
      MIRRORD_LAYER_FILE: ${{ github.workspace }}/target/debug/mirrord_layer_win.dll
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: Remove-Item rust-toolchain.toml
      - uses: metalbear-co/setup-rust-toolchain@a8d42d5aa259519dac1faeee20e37c1fb43453a3
        with:
          cache-shared-key: mirrord-${{ runner.os }}-${{ runner.arch }}
          components: rustfmt, clippy
          target: x86_64-pc-windows-msvc
          toolchain: ${{ inputs.rust_toolchain }}
      - run: |
          cd mirrord/layer-tests/tests/apps/dns_resolve
          cargo build
      - name: build layer
        run: cargo build -p mirrord-layer-win
      - name: build mirrord
        run: cargo build -p mirrord
      - name: Download procdump
        run: |
          $ErrorActionPreference = "Stop"
          Invoke-WebRequest -Uri https://live.sysinternals.com/procdump.exe -OutFile procdump.exe
      # Deterministic with libtest output capture ON (NO --nocapture). Rust catches the
      # first-chance stack overflow and then aborts via __fastfail, which procdump -e / WER miss.
      # So capture the FIRST-CHANCE STATUS_STACK_OVERFLOW (0xC00000FD) directly -- the deepest,
      # pre-handler stack. procdump attaches live during the target's CREATE_SUSPENDED window, so
      # there is no attach race. Watch both the target and the CLI.
      - name: mirrord layer integration tests
        env:
          MIRRORD_LAYER_WAIT_FOR_DEBUGGER: dns_resolve
        run: |
          $dumpDir = Join-Path $env:GITHUB_WORKSPACE "crashdumps"
          New-Item -ItemType Directory -Force -Path $dumpDir | Out-Null
          procdump -accepteula -ma -i $dumpDir
          $watch = @('dns_resolve.exe','mirrord.exe') | ForEach-Object {
            Start-Process .\procdump.exe -ArgumentList '-accepteula','-ma','-e','1','-f','C00000FD.STACK_OVERFLOW','-w',$_,$dumpDir -PassThru -NoNewWindow
          }
          cargo test -p mirrord-layer-tests --no-default-features
          $code = $LASTEXITCODE
          Start-Sleep -Seconds 5
          foreach ($p in $watch) { if (-not $p.HasExited) { Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue } }
          Write-Host "=== captured dumps ==="
          Get-ChildItem -Force $dumpDir | Format-Table Name,Length,LastWriteTime
          exit $code
      - name: Upload crash dumps
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: windows-crash-dumps
          path: |
            crashdumps/
            target/debug/*.pdb
          if-no-files-found: ignore
