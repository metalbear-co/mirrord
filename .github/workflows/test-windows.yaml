      #     . ./scripts/win_build_test_apps_utils.ps1
      #     Build-RepoGoApps -RepoRoot (Join-Path $pwd "mirrord/layer-tests/tests") -OutputPrefix "24"
      # - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
