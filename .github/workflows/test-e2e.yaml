name: Test E2E

on:
  workflow_call:

permissions:
  contents: read

env:
  MIRRORD_TELEMETRY: false
  KIND_CLUSTER_NAME: mirrord-e2e

jobs:
  e2e:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - container-runtime: docker
            cluster-runtime: kind
          - container-runtime: containerd
            cluster-runtime: minikube
    name: e2e (${{ matrix.container-runtime }}/${{ matrix.cluster-runtime }})
    env:
      MIRRORD_AGENT_RUST_LOG: "warn,mirrord=debug"
    steps:
      - name: Free disk space
        uses: metalbear-co/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: metalbear-co/setup-rust-toolchain@a8d42d5aa259519dac1faeee20e37c1fb43453a3
        with:
          cache-shared-key: mirrord-${{ runner.os }}-${{ runner.arch }}
      - uses: ./.github/actions/e2e-setup
        with:
          container-runtime: ${{ matrix.container-runtime }}
          cluster-runtime: ${{ matrix.cluster-runtime }}
          kind-cluster-name: ${{ env.KIND_CLUSTER_NAME }}
      - name: download image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: test
          path: /tmp
      - name: Load test image into minikube
        if: ${{ matrix.cluster-runtime == 'minikube' }}
        run: minikube image load /tmp/test.tar && rm /tmp/test.tar
      - name: Load test image into kind
        if: ${{ matrix.cluster-runtime == 'kind' }}
        run: kind load image-archive /tmp/test.tar --name "$KIND_CLUSTER_NAME" && rm /tmp/test.tar
      - uses: metalbear-co/setup-protoc@770e54d44679c8e1d8fdc06d1d9268fa79fbefb4
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # The mirrord CLI + layer are built once in the `build_e2e_cli` job and
      # downloaded here, instead of compiling them in each e2e matrix leg.
      - name: Download mirrord CLI + layer (built once upstream)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: mirrord-e2e-cli
          path: target/x86_64-unknown-linux-gnu/debug
      - run: chmod +x target/x86_64-unknown-linux-gnu/debug/mirrord
      - name: Run cli E2E tests
        if: ${{ matrix.container-runtime == 'docker' }}
        run: |
          cargo xtask test-e2e --binary target/x86_64-unknown-linux-gnu/debug/mirrord --layer target/x86_64-unknown-linux-gnu/debug/libmirrord_layer.so -- --target=x86_64-unknown-linux-gnu --no-default-features --features cli -- --test-threads=6
      - run: |
          ./target/x86_64-unknown-linux-gnu/debug/mirrord wizard &
          sleep 2 && curl localhost:3000
      - name: Run targetless E2E test
        run: |
          cargo xtask test-e2e --binary target/x86_64-unknown-linux-gnu/debug/mirrord --layer target/x86_64-unknown-linux-gnu/debug/libmirrord_layer.so -- --target=x86_64-unknown-linux-gnu --no-default-features --features targetless -- --test-threads=6 targetless
      - run: kubectl create namespace argo-rollouts
      - run: kubectl apply -n argo-rollouts -f https://github.com/argoproj/argo-rollouts/releases/latest/download/install.yaml
      - name: Run all E2E tests
        run: |
          cargo xtask test-e2e --binary target/x86_64-unknown-linux-gnu/debug/mirrord --layer target/x86_64-unknown-linux-gnu/debug/libmirrord_layer.so -- --target=x86_64-unknown-linux-gnu --no-default-features --features job -- --test-threads=6
          cargo xtask test-e2e --binary target/x86_64-unknown-linux-gnu/debug/mirrord --layer target/x86_64-unknown-linux-gnu/debug/libmirrord_layer.so -- --target=x86_64-unknown-linux-gnu --no-default-features --features ephemeral -- --test-threads=6
      - name: Collect logs
        if: ${{ failure() }}
        run: |
          find /tmp -type f -name 'mirrord-intproxy-*' -print -exec cat {} \;
          kubectl get all
          kubectl describe pods
          if [[ "${{ matrix.cluster-runtime }}" == "minikube" ]]; then
            docker exec minikube find /var/log/pods -print -exec cat {} \;
          else
            kind export logs /tmp/kind-logs --name "$KIND_CLUSTER_NAME"
            find /tmp/kind-logs -type f -print -exec cat {} \;
          fi
