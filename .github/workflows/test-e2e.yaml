name: Test E2E

on:
  workflow_call:
    inputs:
      build_image:
        description: "Build the runner image from this checkout, rather than pulling the published one. Needed when the change affects what the image is built from."
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  # `download image` polls the run's artifacts via `gh run download` while the
  # agent image build may still be in flight, which needs the actions read scope.
  actions: read

env:
  MIRRORD_TELEMETRY: false
  KIND_CLUSTER_NAME: mirrord-e2e

jobs:
  e2e:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - container-runtime: docker
            cluster-runtime: kind
          - container-runtime: containerd
            cluster-runtime: minikube
    name: e2e (${{ matrix.container-runtime }}/${{ matrix.cluster-runtime }})
    env:
      MIRRORD_AGENT_RUST_LOG: "warn,mirrord=debug"
    steps:
      - name: Free disk space
        uses: metalbear-co/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true
      # `tool-cache: true` removes /opt/hostedtoolcache, which the cluster setup restores tools into.
      # The toolchain-setup steps that used to recreate it are gone now that they live in the image,
      # so recreate it here or kind/minikube setup fails.
      - name: Recreate the tool cache directory
        run: sudo mkdir -p /opt/hostedtoolcache && sudo chown "$(id -u):$(id -g)" /opt/hostedtoolcache
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/e2e-setup
        with:
          container-runtime: ${{ matrix.container-runtime }}
          cluster-runtime: ${{ matrix.cluster-runtime }}
          kind-cluster-name: ${{ env.KIND_CLUSTER_NAME }}
      # The suite compiles inside the runner image, which mounts these from the host, so they are
      # cached here rather than by a toolchain action.
      - name: Restore Rust artifacts cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/sccache
            target
          key: rust-mirrord-e2e-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            rust-mirrord-e2e-${{ runner.os }}-${{ runner.arch }}-
      # Every toolchain the suite needs lives in the runner image, which also brings the test apps
      # prebuilt. The published image is built from `main`, so it only has to be rebuilt here when
      # the change touches what goes into it, and then this PR tests its own apps.
      - name: Set up Docker Buildx
        if: ${{ inputs.build_image }}
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build the E2E runner image
        if: ${{ inputs.build_image }}
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: tests/e2e.Dockerfile
          platforms: linux/amd64
          tags: e2e-runner:ci
          push: false
          load: true
          cache-from: type=registry,ref=ghcr.io/metalbear-co/e2e-runner:buildcache-amd64
      - name: Pull the E2E runner image
        if: ${{ !inputs.build_image }}
        run: |
          docker pull ghcr.io/metalbear-co/e2e-runner:latest
          docker tag ghcr.io/metalbear-co/e2e-runner:latest e2e-runner:ci
      - name: Build the mirrord CLI
        uses: ./.github/actions/run-in-e2e-image
        with:
          image: e2e-runner:ci
          command: cargo xtask build-cli
      # The agent image is built by a sibling job that runs concurrently with this one
      # (e2e no longer `needs` it), so the `test` artifact may not exist yet when we get
      # here. Poll for it until it's ready, giving the build up to 8 minutes to finish.
      # If the build job finishes without producing the artifact it has failed (a success
      # would have uploaded it), so bail out immediately instead of waiting out the timeout.
      - name: download image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          deadline=$((SECONDS + 900))
          until gh run download "$GITHUB_RUN_ID" --name test --dir /tmp; do
            build_state=$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/jobs" --paginate \
              --jq '.jobs[] | select(.name | endswith("build-agent-image")) | .status' | head -n1)
            if [ "$build_state" = "completed" ]; then
              echo "::error::Agent image build finished without producing the image artifact; failing fast"
              exit 1
            fi
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::error::Timed out after 15 minutes waiting for the agent image artifact"
              exit 1
            fi
            echo "Agent image artifact not ready yet, retrying in 15s..."
            sleep 15
          done
      - name: Load test image into minikube
        if: ${{ matrix.cluster-runtime == 'minikube' }}
        run: minikube image load /tmp/test.tar && rm /tmp/test.tar
      - name: Load test image into kind
        if: ${{ matrix.cluster-runtime == 'kind' }}
        run: kind load image-archive /tmp/test.tar --name "$KIND_CLUSTER_NAME" && rm /tmp/test.tar
      - name: Run cli E2E tests
        if: ${{ matrix.container-runtime == 'docker' }}
        uses: ./.github/actions/run-in-e2e-image
        with:
          image: e2e-runner:ci
          command: cargo xtask test-e2e --binary target/x86_64-unknown-linux-gnu/debug/mirrord --layer target/x86_64-unknown-linux-gnu/debug/libmirrord_layer.so -- --profile ci --target=x86_64-unknown-linux-gnu --no-default-features --features cli --test-threads=6
      # `mirrord wizard` starts the shared `mirrord ui` server (default port 59281) in the
      # background and returns once it is ready, rather than serving on :3000 in the foreground.
      - name: Smoke-test mirrord wizard (alias to mirrord ui)
        uses: ./.github/actions/run-in-e2e-image
        with:
          image: e2e-runner:ci
          command: >-
            ./target/x86_64-unknown-linux-gnu/debug/mirrord wizard --no-browser &&
            curl -sf localhost:59281/health &&
            (./target/x86_64-unknown-linux-gnu/debug/mirrord ui stop || true)
      - name: Run targetless E2E test
        uses: ./.github/actions/run-in-e2e-image
        with:
          image: e2e-runner:ci
          command: cargo xtask test-e2e --binary target/x86_64-unknown-linux-gnu/debug/mirrord --layer target/x86_64-unknown-linux-gnu/debug/libmirrord_layer.so -- --profile ci --target=x86_64-unknown-linux-gnu --no-default-features --features targetless --test-threads=6 -- targetless
      - run: kubectl create namespace argo-rollouts
      - run: kubectl apply -n argo-rollouts -f https://github.com/argoproj/argo-rollouts/releases/latest/download/install.yaml
      - name: Run all E2E tests
        uses: ./.github/actions/run-in-e2e-image
        with:
          image: e2e-runner:ci
          command: >-
            cargo xtask test-e2e --binary target/x86_64-unknown-linux-gnu/debug/mirrord --layer target/x86_64-unknown-linux-gnu/debug/libmirrord_layer.so -- --profile ci --target=x86_64-unknown-linux-gnu --no-default-features --features job --test-threads=6 &&
            cargo xtask test-e2e --binary target/x86_64-unknown-linux-gnu/debug/mirrord --layer target/x86_64-unknown-linux-gnu/debug/libmirrord_layer.so -- --profile ci --target=x86_64-unknown-linux-gnu --no-default-features --features ephemeral --test-threads=6
      - name: Save Rust artifacts cache
        if: ${{ success() }}
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cache/sccache
            target
          key: rust-mirrord-e2e-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
      - name: Collect logs
        if: ${{ failure() }}
        run: |
          find /tmp -type f -name 'mirrord-intproxy-*' -print -exec cat {} \;
          kubectl get all
          kubectl describe pods
          if [[ "${{ matrix.cluster-runtime }}" == "minikube" ]]; then
            docker exec minikube find /var/log/pods -print -exec cat {} \;
          else
            kind export logs /tmp/kind-logs --name "$KIND_CLUSTER_NAME"
            find /tmp/kind-logs -type f -print -exec cat {} \;
          fi
