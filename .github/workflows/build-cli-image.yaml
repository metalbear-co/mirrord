name: Build CLI Image

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build-cli-image:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix:
        include:
          - artifact_name: cli-image-linux-amd64
            platform: linux/amd64
            runs_on: ubuntu-24.04
          - artifact_name: cli-image-linux-arm64
            platform: linux/arm64
            runs_on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
      - name: build and export
        uses: docker/bake-action@82490499d2e5613fcead7e128237ef0b0ea210f7
        env:
          DOCKER_BUILD_RECORD_UPLOAD: "false"
          BUILDER_PLATFORM: ${{ matrix.platform }}
          PLATFORMS: ${{ matrix.platform }}
          CLI_TAGS: "cli_image"
        with:
          source: .
          files: ci/docker-bake.hcl
          targets: cli
          set: |
            cli.output=type=docker,dest=${{ github.workspace }}/cli_image.tar
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ github.workspace }}/cli_image.tar
          if-no-files-found: error
