## Heavily inspired by https://github.com/astral-sh/uv/blob/main/.github/workflows/ci.yml
name: CI

on:
  merge_group:
  workflow_dispatch:
  push:
    branches: [main, "*staging*", "windows-support", "gh-readonly-queue*"]
  pull_request:
    branches: [main, "*staging*", "windows-support"]
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel previous runs on the same PR.
concurrency:
  group: ${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── plan ────────────────────────────────────────────────────────────

  plan:
    runs-on: ubuntu-24.04
    # don't run CI on drafts
    if: github.event.pull_request.draft == false
    outputs:
      rust_toolchain: ${{ steps.toolchain.outputs.rust_toolchain }}
      rs_changed: ${{ steps.changed-rs.outputs.any_changed }}
      windows_changed: ${{ steps.changed-windows.outputs.any_changed }}
      markdown_changed: ${{ steps.changed-markdown.outputs.any_changed }}
      ci_changed: ${{ steps.changed-ci.outputs.any_changed }}
      protocol_changed: ${{ steps.changed-protocol.outputs.any_changed }}
      config_schema_changed: ${{ steps.changed-config-schema.outputs.any_changed }}
      dockerfile_changed: ${{ steps.changed-dockerfile.outputs.any_changed }}
      wizard_frontend_changed: ${{ steps.changed-wizard-frontend.outputs.any_changed }}
      release_branch: ${{ steps.release-branch.outputs.branch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
      - id: toolchain
        run: echo "rust_toolchain=nightly-2026-02-24" >> "$GITHUB_OUTPUT"
      - name: get CI changes
        id: changed-ci
        uses: metalbear-co/changed-files@9200e69727eb73eb060652b19946b8a2fdfb654b
        with:
          files: |
            .github/**
      - name: get changed rs files
        id: changed-rs
        uses: metalbear-co/changed-files@9200e69727eb73eb060652b19946b8a2fdfb654b
        with:
          files: |
            **/*.rs
            mirrord/**
            tests/**
            Cargo.toml
            Cargo.lock
            .dockerignore
            rust-toolchain.toml
            rustfmt.toml
            deny.toml
            .cargo/**
      - name: get changed windows files
        id: changed-windows
        uses: metalbear-co/changed-files@9200e69727eb73eb060652b19946b8a2fdfb654b
        with:
          files: |
            mirrord/layer-win/**
            mirrord/str-win/**
            mirrord/**/windows/**
            mirrord/**/win32/**
            mirrord/**/win/**
            scripts/**/*.ps1
            **/*.ps1
            .github/workflows/windows-build.yaml
      - name: get markdown changes
        id: changed-markdown
        uses: metalbear-co/changed-files@9200e69727eb73eb060652b19946b8a2fdfb654b
        with:
          files: |
            README.md
      - name: get protocol changes
        id: changed-protocol
        uses: metalbear-co/changed-files@9200e69727eb73eb060652b19946b8a2fdfb654b
        with:
          files: |
            mirrord/protocol/**
      - name: get protocol toml changes
        id: changed-protocol-toml
        uses: metalbear-co/changed-files@9200e69727eb73eb060652b19946b8a2fdfb654b
        with:
          files: |
            mirrord/protocol/Cargo.toml
      - name: get dockerfile changes
        id: changed-dockerfile
        uses: metalbear-co/changed-files@9200e69727eb73eb060652b19946b8a2fdfb654b
        with:
          files: |
            mirrord/agent/Dockerfile
            mirrord/cli/Dockerfile
      - name: get wizard frontend changes
        id: changed-wizard-frontend
        uses: metalbear-co/changed-files@9200e69727eb73eb060652b19946b8a2fdfb654b
        with:
          files: |
            wizard-frontend/**
      - name: verify protocol bump
        run: |
          if [ "${{ steps.changed-protocol.outputs.any_changed }}" == "true" ] && [ "${{ steps.changed-protocol-toml.outputs.any_changed }}" != "true" ]; then
            echo "Error: Protocol has changed but Cargo.toml has not. Please update Cargo.toml."
            exit 1
          fi
      - name: get config changes
        id: changed-config-schema
        uses: metalbear-co/changed-files@9200e69727eb73eb060652b19946b8a2fdfb654b
        with:
          files: |
            mirrord-schema.json
      - id: release-branch
        run: |
          echo "branch=$([[ "${{ github.head_ref || github.ref_name }}" =~ ^releases/[0-9]+\.[0-9]+\.[0-9]+$ ]]  && echo "true" || echo "false" )" >> "$GITHUB_OUTPUT"

  # ── checks (no build deps) ─────────────────────────────────────────

  check-towncrier:
    uses: ./.github/workflows/check-towncrier.yaml

  check-typos:
    uses: ./.github/workflows/check-typos.yaml

  check-vale:
    uses: ./.github/workflows/check-vale.yaml

  check-lint:
    needs: [plan]
    if: ${{ needs.plan.outputs.rs_changed == 'true' || needs.plan.outputs.ci_changed == 'true' }}
    uses: ./.github/workflows/check-lint.yaml
    with:
      rust_toolchain: ${{ needs.plan.outputs.rust_toolchain }}
    secrets: inherit

  check-wizard-frontend-lint:
    needs: [plan]
    if: ${{ needs.plan.outputs.wizard_frontend_changed == 'true' }}
    uses: ./.github/workflows/check-wizard-frontend-lint.yaml

  check-cargo-deny:
    needs: [plan]
    if: ${{ needs.plan.outputs.rs_changed == 'true' || needs.plan.outputs.ci_changed == 'true' || needs.plan.outputs.windows_changed == 'true' }}
    uses: ./.github/workflows/check-cargo-deny.yaml
    with:
      rust_toolchain: ${{ needs.plan.outputs.rust_toolchain }}

  check-rust-docs:
    needs: [plan]
    if: ${{ needs.plan.outputs.rs_changed == 'true' || needs.plan.outputs.ci_changed == 'true' }}
    uses: ./.github/workflows/check-rust-docs.yaml
    with:
      rust_toolchain: ${{ needs.plan.outputs.rust_toolchain }}
    secrets: inherit

  check-lint-markdown:
    needs: [plan]
    if: ${{ needs.plan.outputs.markdown_changed == 'true' || needs.plan.outputs.ci_changed == 'true' }}
    uses: ./.github/workflows/check-lint-markdown.yaml

  # ── builds ──────────────────────────────────────────────────────────

  build-agent-image:
    needs: [plan]
    if: ${{ needs.plan.outputs.rs_changed == 'true' || needs.plan.outputs.ci_changed == 'true' || needs.plan.outputs.dockerfile_changed == 'true' }}
    uses: ./.github/workflows/build-agent-image.yaml

  build-cli-image:
    needs: [plan]
    if: ${{ needs.plan.outputs.rs_changed == 'true' || needs.plan.outputs.ci_changed == 'true' || needs.plan.outputs.dockerfile_changed == 'true' }}
    uses: ./.github/workflows/build-cli-image.yaml

  build-mirrord-cli:
    needs: [plan]
    if: ${{ needs.plan.outputs.release_branch == 'true' }}
    uses: ./.github/workflows/build-mirrord-cli.yaml
    secrets: inherit

  # ── tests ───────────────────────────────────────────────────────────

  test-integration:
    needs: [plan]
    if: ${{ needs.plan.outputs.rs_changed == 'true' || needs.plan.outputs.ci_changed == 'true' }}
    uses: ./.github/workflows/test-integration.yaml
    secrets: inherit

  test-macos:
    needs: [plan]
    if: ${{ needs.plan.outputs.rs_changed == 'true' || needs.plan.outputs.ci_changed == 'true' }}
    uses: ./.github/workflows/test-macos.yaml
    with:
      rust_toolchain: ${{ needs.plan.outputs.rust_toolchain }}
    secrets: inherit

  test-e2e:
    needs: [plan, build-agent-image]
    if: ${{ needs.plan.outputs.rs_changed == 'true' || needs.plan.outputs.ci_changed == 'true' }}
    uses: ./.github/workflows/test-e2e.yaml
    secrets: inherit

  test-windows:
    needs: [plan]
    if: ${{ needs.plan.outputs.rs_changed == 'true' || needs.plan.outputs.windows_changed == 'true' || needs.plan.outputs.ci_changed == 'true' }}
    uses: ./.github/workflows/test-windows.yaml
    with:
      rust_toolchain: ${{ needs.plan.outputs.rust_toolchain }}

  # ── external calls ──────────────────────────────────────────────────

  intellij-e2e-on-release-branch:
    needs: [build-mirrord-cli, build-agent-image]
    uses: metalbear-co/mirrord-intellij/.github/workflows/reusable_e2e.yaml@main
    with:
      mirrord_release_branch: true

  vscode-e2e-on-release-branch:
    needs: [build-mirrord-cli, build-agent-image]
    uses: metalbear-co/mirrord-vscode/.github/workflows/reusable_e2e.yaml@main
    with:
      mirrord_release_branch: true

  # ── gate ────────────────────────────────────────────────────────────

  ci-success:
    name: ci
    if: always()
    needs:
      [
        plan,
        check-towncrier,
        check-typos,
        check-vale,
        check-lint,
        check-wizard-frontend-lint,
        check-cargo-deny,
        check-rust-docs,
        check-lint-markdown,
        build-agent-image,
        build-cli-image,
        build-mirrord-cli,
        test-integration,
        test-macos,
        test-e2e,
        test-windows,
        intellij-e2e-on-release-branch,
        vscode-e2e-on-release-branch,
      ]
    runs-on: ubuntu-24.04
    steps:
      - name: Check required jobs passed
        run: |
          failing=$(echo "$NEEDS_JSON" | jq -r 'to_entries[] | select(.value.result != "success" and .value.result != "skipped") | "\(.key): \(.value.result)"')
          if [ -n "$failing" ]; then
            echo "$failing"
            exit 1
          fi
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
