name: Operator E2E Test

on:
  workflow_dispatch:
    inputs:
      mirrord_commit:
        description: "Mirrord commit to use for E2E tests"
        required: true
        type: string
      mirrord_branch:
        description: "Mirrord branch to use for E2E tests"
        required: true
        type: string
      operator_branch:
        description: "Operator branch to use for E2E tests"
        required: false
        type: string
        default: "main"
  pull_request_review:
    branches: [main]
    types: [submitted]

jobs:
  check_if_release_branch:
    runs-on: ubuntu-24.04
    outputs:
      release_branch: ${{ steps.release-branch.outputs.branch }}
    steps:
      - id: release-branch
        run: |
          echo "branch=$([[ "${{ github.event.pull_request.head.ref || github.head_ref || github.ref_name }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]  && echo "true" || echo "false" )" >> "$GITHUB_OUTPUT"
      - name: output test
        run: |
          echo ${{ steps.release-branch.outputs.branch }}

  trigger-operator-e2e:
    needs: [check_if_release_branch]
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.review.state == 'approved' && needs.check_if_release_branch.outputs.release_branch == 'true') }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Trigger operator E2E workflow and wait for completion
        id: trigger-e2e
        uses: metalbear-co/return-dispatch@main
        continue-on-error: true
        with:
          token: ${{ secrets.OPERATOR_E2E_PAT }}
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.operator_branch || 'main' }}
          repo: operator
          owner: metalbear-co
          workflow: operator-e2e.yaml
          workflow_inputs: |
            {
              "mirrord_commit": "${{ github.event_name == 'workflow_dispatch' && inputs.mirrord_commit || github.event.pull_request.head.sha }}",
              "mirrord_branch": "${{ github.event_name == 'workflow_dispatch' && inputs.mirrord_branch || github.event.pull_request.head.ref }}"
            }
          workflow_timeout_seconds: 7200
          workflow_job_steps_retry_seconds: 30

      - name: Use the output run ID and URL
        run: |
          echo ${{steps.trigger-e2e.outputs.run_id}}
          echo ${{steps.trigger-e2e.outputs.run_url}}

      - name: Await Run ID ${{ steps.trigger-e2e.outputs.run_id }}
        uses: metalbear-co/await-remote-run@main
        with:
          token: ${{ secrets.OPERATOR_E2E_PAT }}
          repo: operator
          owner: metalbear-co
          run_id: ${{ steps.trigger-e2e.outputs.run_id }}
          run_timeout_seconds: 7200 # Optional
          poll_interval_ms: 5000 # Optional

      - name: Show operator E2E results
        run: |
          echo "✅ Operator E2E tests completed successfully!"
          echo "Run ID: ${{ steps.trigger-e2e.outputs.run_id }}"
          echo "Run URL: ${{ steps.trigger-e2e.outputs.run_url }}"
          echo "Distinct ID used: ${{ steps.trigger-e2e.outputs.run_id }}"
