name: Operator E2E Test

# This workflow supports two entry points:
# 1. `workflow_dispatch` for manual testing.
# 2. `push` for release branches in the main `metalbear-co/mirrord`
#    repository.
#
# Release PRs are expected to come from branches named
# `release/<major>.<minor>.<patch>` in this repository. Automatic runs happen
# when commits are pushed to those branches in `metalbear-co/mirrord`, so fork
# PRs do not trigger this workflow.
#
# `OPERATOR_E2E_PAT` requirements for the remote operator workflow:
# - Classic PAT: `repo`
# - Fine-grained PAT:
#   - `metalbear-co/operator`: `Actions: read` and `Actions: write`
#
# Automatic runs only proceed when the pushed branch matches
# `<major>.<minor>.<patch>`.
#
on:
  workflow_dispatch:
    inputs:
      mirrord_commit:
        description: "Mirrord commit to use for E2E tests"
        required: true
        type: string
      mirrord_branch:
        description: "Mirrord branch to use for E2E tests"
        required: true
        type: string
      operator_branch:
        description: "Operator branch to use for E2E tests"
        required: false
        type: string
        default: "main"
  push:
    branches:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  resolve_trigger_context:
    runs-on: ubuntu-24.04
    outputs:
      mirrord_commit: ${{ steps.resolve.outputs.mirrord_commit }}
      mirrord_branch: ${{ steps.resolve.outputs.mirrord_branch }}
      operator_branch: ${{ steps.resolve.outputs.operator_branch }}
    steps:
      - name: Resolve workflow context
        id: resolve
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            manual_commit="${{ inputs.mirrord_commit }}"
            manual_branch="${{ inputs.mirrord_branch }}"
            operator_branch="${{ inputs.operator_branch || 'main' }}"
            echo "mirrord_commit=$manual_commit" >> "$GITHUB_OUTPUT"
            echo "mirrord_branch=$manual_branch" >> "$GITHUB_OUTPUT"
            echo "operator_branch=$operator_branch" >> "$GITHUB_OUTPUT"
          else
            echo "mirrord_commit=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "mirrord_branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "operator_branch=main" >> "$GITHUB_OUTPUT"
          fi

  trigger-operator-e2e:
    needs: [resolve_trigger_context]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Trigger operator E2E workflow and wait for completion
        id: trigger-e2e
        uses: metalbear-co/return-dispatch@main
        continue-on-error: true
        with:
          # This PAT is only used to dispatch the workflow in
          # `metalbear-co/operator`.
          token: ${{ secrets.OPERATOR_E2E_PAT }}
          ref: ${{ needs.resolve_trigger_context.outputs.operator_branch }}
          repo: operator
          owner: metalbear-co
          workflow: operator-e2e.yaml
          workflow_inputs: |
            {
              "mirrord_commit": "${{ needs.resolve_trigger_context.outputs.mirrord_commit }}",
              "mirrord_branch": "${{ needs.resolve_trigger_context.outputs.mirrord_branch }}"
            }
          workflow_timeout_seconds: 7200
          workflow_job_steps_retry_seconds: 30

      - name: Use the output run ID and URL
        run: |
          echo ${{steps.trigger-e2e.outputs.run_id}}
          echo ${{steps.trigger-e2e.outputs.run_url}}

      - name: Await Run ID ${{ steps.trigger-e2e.outputs.run_id }}
        uses: metalbear-co/await-remote-run@main
        with:
          # This PAT is only used to read workflow runs in
          # `metalbear-co/operator`.
          token: ${{ secrets.OPERATOR_E2E_PAT }}
          repo: operator
          owner: metalbear-co
          run_id: ${{ steps.trigger-e2e.outputs.run_id }}
          run_timeout_seconds: 7200 # Optional
          poll_interval_ms: 5000 # Optional

      - name: Show operator E2E results
        run: |
          echo "✅ Operator E2E tests completed successfully!"
          echo "Run ID: ${{ steps.trigger-e2e.outputs.run_id }}"
          echo "Run URL: ${{ steps.trigger-e2e.outputs.run_url }}"
          echo "Distinct ID used: ${{ steps.trigger-e2e.outputs.run_id }}"
