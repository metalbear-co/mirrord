name: Build and Push Calculate Version Script

on:
  push:
    branches:
      - main
    paths:
      - 'calculate-version-script/**'
      - '.github/workflows/publish-calculate-version-script.yaml'
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/metalbear-co/ci/calculate-version-script

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
            
      - name: Set Docker tags
        uses: ./.github/actions/set-image-tags
        id: set-tags
        with:
          base-name: ci/calculate-version-script

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: calculate-version-script
          push: true
          tags: ${{ steps.set-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
