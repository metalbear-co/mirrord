[package]
name = "tests"
version = "0.1.0"
edition = "2021"

[lints]
workspace = true

[lib]
doctest = false

[dependencies]
k8s-openapi.workspace = true
kube.workspace = true
reqwest.workspace = true
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "net", "macros", "process"] }
serde_json.workspace = true
mirrord = { artifact = "bin", path = "../mirrord/cli" }
serde.workspace = true
futures.workspace = true
rstest = "0.23"
rand = "0.8"
futures-util = "0.3"
wsl = "0.1"
chrono = "0.4"
tempfile = "3"
fancy-regex.workspace = true
rustls.workspace = true

[dev-dependencies]
mirrord-operator = { path = "../mirrord/operator", features = ["setup", "crd"] }

aws-config = { version = "1.5", features = ["behavior-version-latest"] }
aws-credential-types = "1.2"
aws-sdk-sqs = { version = "1.39" }
aws-types = "1.3"
json-patch = "2.0"
jsonptr = "0.4" # for compatiblity with json-patch
regex.workspace = true
bytes.workspace = true
hyper.workspace = true
hyper-util.workspace = true
http-body-util.workspace = true
tokio-tungstenite = { version = "0.24" }

[features]
default = ["ephemeral", "job", "cli", "targetless"]
ephemeral = []
job = []
operator = []
docker = []
cli = []
targetless = []
