[package]
name = "mirrord-protocol"
version = "1.26.2"
authors.workspace = true
description.workspace = true
documentation.workspace = true
readme.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
publish.workspace = true
edition.workspace = true

[lints]
workspace = true

[dependencies]
actix-codec.workspace = true
bincode.workspace = true
bytes.workspace = true
thiserror.workspace = true
futures.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_json_path = { workspace = true, features = ["functions"] }
serde_json_path_macros.workspace = true
tracing = { workspace = true, optional = true }
http.workspace = true
http-body.workspace = true
http-serde = "2"
http-body-util = { workspace = true }
fancy-regex = { workspace = true, optional = true }
socket2 = { workspace = true, optional = true }
semver = { workspace = true, features = ["serde"] }
derive_more = { workspace = true, features = [
  "from",
  "into",
  "deref",
  "display",
] }
uuid.workspace = true

mirrord-macros = { path = "../macros" }

strum.workspace = true
strum_macros.workspace = true
jaq-core = { workspace = true, optional = true }
jaq-std = { workspace = true, optional = true }
jaq-json = { workspace = true, optional = true }

[target.'cfg(target_os = "linux")'.dependencies]
libc = { workspace = true, optional = true }
nix = { workspace = true, features = ["fs"] }

[features]
default = []
libc = [
  "dep:libc"
]
jaq = [
  "dep:jaq-core",
  "dep:jaq-std",
  "dep:jaq-json",
  "dep:tracing"
]
regex = [
  "dep:fancy-regex",
  "dep:tracing"
]
socket2 = [
  "dep:socket2"
]
uuid_gen = [
  "uuid/v4"
]
windows_build = []
