[package]
name = "mirrord-layer"
version.workspace = true
authors.workspace = true
description.workspace = true
documentation.workspace = true
readme.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
publish.workspace = true
edition.workspace = true

[lints]
workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
mirrord-config = { path = "../config"}
mirrord-protocol = { path = "../protocol"}
mirrord-layer-macro = { path = "./macro"}
mirrord-console = { path = "../console" }
mirrord-intproxy-protocol = { path = "../intproxy/protocol", features = ["codec"] }

ctor = "0.2"
libc.workspace = true
bincode.workspace = true
nix = { workspace = true, features = ["net", "process", "signal"]}
tracing.workspace = true
tracing-subscriber.workspace = true
frida-gum = { version = "0.14", features = ["auto-download"] }

serde_json.workspace = true

thiserror.workspace = true
num-traits.workspace = true

rand = "0.8"
fancy-regex.workspace = true
regex.workspace = true
errno = "0.3"
socket2.workspace = true
bytemuck = "1"
hashbrown = "0.15"
null-terminated = "0.3"
base64.workspace = true

[target.'cfg(target_os = "linux")'.dependencies]
syscalls = { version = "0.6", features = ["full"] }

[target.'cfg(target_os = "macos")'.dependencies]
exec.workspace = true
mirrord-sip = { path = "../sip" }
resolv-conf = "0.7"

[dev-dependencies]
mirrord-intproxy = { path = "../intproxy" }
rstest = "*"
tempfile = "3"
test-cdylib = "*"
tokio = { workspace = true, features = ["rt", "net", "macros"] }
tests = { path = "../../tests" }
futures.workspace = true
actix-codec.workspace = true

[lib]
crate-type = ["cdylib"]
