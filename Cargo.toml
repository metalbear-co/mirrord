hyper = { version = "1.7", features = ["full"] }
hyper-util = { version = "0.1" }
indicatif = "0.18"
ipnet = "2.8"
iptables = { git = "https://github.com/metalbear-co/rust-iptables.git", rev = "e66c7332e361df3c61a194f08eefe3f40763d624" }
itertools = "0.14.0"
jaq-core = "2.2.1"
jaq-json = "1.1.3"
jaq-std = "2.1.2"
k8s-cri = "0.9"
k8s-openapi = { version = "0.27", features = ["v1_31"] }
kube = { version = "3.1", default-features = false, features = [
