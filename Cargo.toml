num-traits = "0.2"
objc2-core-foundation = "0.3"
object = "0.36"
oci-spec = "0.7.0"
once_cell = "1"
opener = "0.8.3"
pem = "3"
phnt = "0.1.2"
pnet_packet = "0.35"
prettytable-rs = "0.10"
proc-macro2 = "1"
