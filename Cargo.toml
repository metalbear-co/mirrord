# Cross compilable mirrord workspace
# On Windows: You can build specific packages like cargo build -p mirrord -p mirrord-layer-win
# On Unix: Default cargo build will build the Unix-compatible crates
# All platforms: mirrord/* in members ensures all crates are available for explicit builds
# This will be resolved in the future, follow - https://github.com/rust-lang/rfcs/pull/3759
[workspace]

members = [
    "mirrord/*",
    "mirrord/agent/env",
    "mirrord/agent/iptables",
    "mirrord/layer-tests/tests/apps/fileops",
    "mirrord/layer-tests/tests/apps/outgoing",
    "mirrord/layer-tests/tests/apps/double_listen",
    "mirrord/layer-tests/tests/apps/listen_ports",
    "mirrord/layer-tests/tests/apps/dns_resolve",
    "mirrord/layer-tests/tests/apps/recv_from",
    "mirrord/layer-tests/tests/apps/issue1776",
    "mirrord/layer-tests/tests/apps/issue1776portnot53",
    "mirrord/layer-tests/tests/apps/issue1899",
    "mirrord/layer-tests/tests/apps/issue2001",
    "mirrord/layer-tests/tests/apps/issue2438",
    "mirrord/layer-tests/tests/apps/issue3248",
    "mirrord/layer-tests/tests/apps/rebind0",
    "mirrord/layer-tests/tests/apps/dup_listen",
    "sample/rust",
    "medschool",
    "tests",
    "test-utils",
    "tests/rust-e2e-fileops",
    "tests/rust-unix-socket-client",
    "tests/rust-bypassed-unix-socket",
    "tests/issue1317",
    "tests/rust-websockets",
    "tests/rust-sqs-printer",
    "xtask",
]
resolver = "2"

[workspace.metadata.cargo-shear]
ignored-paths = [
    "mirrord/layer-tests/tests/apps/issue1054/issue1054.rs",
    "mirrord/layer-tests/tests/apps/issue1123/issue1123.rs",
    "mirrord/layer-tests/tests/apps/issue1458/issue1458.rs",
    "mirrord/layer-tests/tests/apps/issue1458portnot53/issue1458portnot53.rs",
    "mirrord/layer-tests/tests/apps/issue2058/issue2058.rs",
    "mirrord/layer-tests/tests/apps/issue2204/issue2204.rs",
]

# latest commits on rustls suppress certificate verification
[workspace.package]
edition = "2024"
version = "3.203.1"
license = "MIT"
readme = "README.md"
repository = "https://github.com/metalbear/mirrord"
documentation = "https://metalbear.co/mirrord/docs"
authors = ["MetalBear <hi@metalbear.co>"]
description = "Run a local process in the context of a cloud environment"
homepage = "https://metalbear.co/mirrord"
publish = false
keywords = [
    "cli",
    "backend",
    "debug",
    "test",
    "kubernetes",
    "cloud",
    "native",
    "local",
    "ide",
    "devtool",
    "developer",
    "tool",
]
categories = ["development-tools", "backend", "devtool"]

[workspace.dependencies]
actix-codec = "0.5"
actix-web = "4"
anyhow = "1.0"
apple-codesign = { version = "0.29", default-features = false }
assert-json-diff = "2"
async-pidfd = "0.1.5"
async-stream = "0.3"
async-trait = "0.1"
aws-config = { version = "1.5", default-features = false }
aws-sdk-sqs = { version = "1.39", default-features = false }
axum = "0.8"
axum-extra = { version = "0.10", features = ["cookie"] }
base64 = "0.22"
bcder = "0.7"
bimap = "0.6"
bincode = { version = "2", features = ["serde"] }
bitflags = "2"
bollard = "0.18"
bytes = "1"
caps = "0.5"
chrono = "0.4"
ci_info = "0.14"
clap = { version = "4", features = ["derive", "env"] }
clap_complete = "4.4.1"
const-random = "0.1.15"
containerd-client = "0.6"
ctor = "0.2"
derive_more = "2.0.1"
dll-syringe = "0.16.0"
dns-lookup = "3"
dotenvy = "0.15"
drain = "0.1"
enum_dispatch = "0.3"
env_logger = "0.11"
errno = "0.3"
eventsource-stream = "0.2"
exec = "0.3"
faccess = "0.2"
fancy-regex = { version = "0.14" }
flate2 = { version = "1", default-features = false, features = ["rust_backend"] }
frida-gum = { version = "0.17", features = ["auto-download", "std"] }
fs4 = { version = "0.13", features = ["tokio", "sync"], default-features = false }
futures = "0.3"
futures-util = "0.3"
glob = "0.3"
hex = "0.4"
hickory-resolver = { version = "0.24.3", features = ["serde", "tokio-runtime"] }
home = "0.5"
http = { version = "1" }
http-body = "1"
http-body-util = "0.1"
http-serde = "2"
httparse = "1"
humantime = "2"
