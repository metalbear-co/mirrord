resolv-conf = "0.7"
rstest = "0.23"
rust-embed = "8"
rustls = "0.23"
rustls-pemfile = "2"
schemars = { version = "1.0" }
semver = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_json_path = "0.7.2"
serde_json_path_macros = "0.1.6"
serde_urlencoded = "0.7"
serde_yaml = "0.9"
sha2 = "0.10"
shellexpand = "3"
socket2 = { version = "0.5", features = ["all"] }
streammap-ext = "0.1"
strum = "0.27.1"
strum_macros = "0.27.1"
syn = { version = "2", features = ["full", "extra-traits"] }
syscalls = { version = "0.6", features = ["full"] }
tar = "0.4"
tempfile = "3"
tera = "1"
test-cdylib = "1"
thiserror = "2"
tokio = { version = "1", features = ["fs", "net", "io-util"] }
tokio-retry = "0.3"
tokio-rustls = "0.26"
tokio-stream = { version = "0.1", features = ["sync"] }
tokio-tungstenite = { version = "0.24" }
tokio-util = { version = "0.7", features = ["net", "codec"] }
toml = "0.8"
tonic = "0.12"
tower = "0.5"
tower-http = { version = "0.6.6", features = ["fs", "set-header"] }
